# Gateway Authentication & Authorization Policy — Policy-as-Code
# ─────────────────────────────────────────────────────────────
# Authentication: JWT (OIDC-compatible)
# Authorization:  Role + claim based, tenant-scoped
# Swap point: claims mapping can be redirected to any OIDC provider
#   (Entra ID, Keycloak, Auth0, Okta — swap Authority URL only)

name: jwt-auth-policy
priority: 1
pathPattern: /api/**
requiresTenant: true

authentication:
  scheme: jwt-bearer
  authority: "${AUTH_AUTHORITY}"        # e.g., https://login.microsoftonline.com/{tenantId}
  audience: "${AUTH_AUDIENCE}"          # e.g., api://retail-pos
  requiredClaims:
    - tenant_id
    - sub
  clockSkewSeconds: 30

authorization:
  defaultAction: deny          # Deny by default — explicit allow required

  routes:
    - path: /api/v1/sales
      methods: [POST]
      allowedRoles: [cashier, manager, admin]

    - path: /api/v1/sales/{id}/void
      methods: [POST]
      allowedRoles: [manager, admin]
      requiredClaims:
        - void_permission

    - path: /api/v1/reports/**
      methods: [GET]
      allowedRoles: [manager, admin, analyst]

    - path: /api/v1/admin/**
      methods: [GET, POST, PUT, DELETE]
      allowedRoles: [admin]
      requiredClaims:
        - mfa_completed

    - path: /health
      methods: [GET]
      allowedRoles: []              # Public — no auth required
      anonymous: true

  # Tenant isolation enforcement
  tenantIsolation:
    enabled: true
    claimField: tenant_id
    headerField: X-Tenant-Id
    action: block               # block | log | warn

---
# PCI Hardening: Restrict payment-related routes
name: pci-payment-policy
priority: 5
pathPattern: /api/v1/payments/**

pci:
  requireMfa: true
  auditAllRequests: true
  blockOnSuspiciousUserAgent: true
  requireTls12OrHigher: true
  noCardDataInLogs: true
  maskFields:
    - cardNumber
    - cvv
    - pan
