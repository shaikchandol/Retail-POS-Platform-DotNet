---
# Kafka cluster using Strimzi Operator
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: retail-pos-kafka
  namespace: kafka
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
    - name: tls
      port: 9093
      type: internal
      tls: true
      authentication:
        type: scram-sha-512
    - name: external
      port: 9094
      type: loadbalancer
      tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      log.retention.hours: 720        # 30 days default
      log.retention.bytes: 107374182400  # 100 GB per partition
      message.max.bytes: 10485760     # 10 MB max message
    storage:
      type: jbod
      volumes:
      - id: 0
        type: persistent-claim
        size: 500Gi
        class: fast-ssd
    resources:
      requests:
        memory: 4Gi
        cpu: 1
      limits:
        memory: 8Gi
        cpu: 4
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 50Gi
      class: fast-ssd
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# Kafka Topics
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: retail-sales-events
  namespace: kafka
  labels:
    strimzi.io/cluster: retail-pos-kafka
spec:
  partitions: 24
  replicas: 3
  config:
    retention.ms: 2592000000   # 30 days
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: retail-orders-events
  namespace: kafka
  labels:
    strimzi.io/cluster: retail-pos-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 2592000000
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: retail-inventory-events
  namespace: kafka
  labels:
    strimzi.io/cluster: retail-pos-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 604800000    # 7 days
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: retail-payments-events
  namespace: kafka
  labels:
    strimzi.io/cluster: retail-pos-kafka
spec:
  partitions: 24
  replicas: 3
  config:
    retention.ms: 7776000000   # 90 days (compliance)
