apiVersion: v1
kind: Namespace
metadata:
  name: retail-pos
  labels:
    name: retail-pos
    environment: production
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: retail-pos-dev
  labels:
    name: retail-pos-dev
    environment: development
---
# Default deny-all network policy (Zero Trust)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: retail-pos
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow intra-namespace + Dapr sidecar communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: retail-pos
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: retail-pos
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: retail-pos
  - to: []
    ports:
    - port: 443   # External TLS
    - port: 5671  # AMQP
    - port: 9092  # Kafka
    - port: 5432  # PostgreSQL
    - port: 6379  # Redis
