apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: retail-pos
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: "redis-master.redis.svc.cluster.local:6379"
  - name: redisPassword
    secretKeyRef:
      name: redis-secret
      key: redis-password
  - name: enableTLS
    value: "true"
  - name: redeliveryDelay
    value: "2s"
  - name: maxRetries
    value: "3"
  - name: keyPrefix
    value: "tenant"          # Enables per-tenant key namespacing
  - name: ttlInSeconds
    value: "86400"
auth:
  secretStore: kubernetes
scopes:
- sales-service
- orders-service
- inventory-service
