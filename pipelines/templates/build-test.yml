parameters:
- name: serviceDir
  type: string
- name: serviceName
  type: string
- name: dotnetVersion
  type: string
  default: '10.0.x'
- name: coverageThreshold
  type: number
  default: 80

steps:
- task: UseDotNet@2
  displayName: Install .NET ${{ parameters.dotnetVersion }}
  inputs:
    version: ${{ parameters.dotnetVersion }}
    includePreviewVersions: true

- task: DotNetCoreCLI@2
  displayName: Restore
  inputs:
    command: restore
    projects: ${{ parameters.serviceDir }}/**/*.sln

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: ${{ parameters.serviceDir }}/**/*.sln
    arguments: --configuration Release --no-restore

- task: DotNetCoreCLI@2
  displayName: Unit Tests
  inputs:
    command: test
    projects: ${{ parameters.serviceDir }}/**/Tests/**/*.UnitTests.csproj
    arguments: --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/coverage

- task: PublishCodeCoverageResults@2
  inputs:
    codeCoverageTool: Cobertura
    summaryFileLocation: $(Agent.TempDirectory)/coverage/**/coverage.cobertura.xml
