trigger:
  branches:
    include: [main, release/*]
  paths:
    include:
      - services/api-gateway/**
      - services/bff/**
      - policies/**

variables:
  - group: retail-pos-platform-vars

stages:
- stage: PolicyValidation
  displayName: Policy-as-Code Validation
  jobs:
  - job: ValidatePolicies
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: DotNetCoreCLI@2
      displayName: Run Gateway Policy Tests
      inputs:
        command: test
        projects: 'policies/tests/**/*.csproj'
        arguments: '--logger trx --collect "XPlat Code Coverage"'

    - script: |
        # Validate all YAML policy files are syntactically valid
        for f in policies/gateway/*.yaml; do
          python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "✓ $f" || (echo "✗ $f" && exit 1)
        done
      displayName: Validate Policy YAML Syntax

- stage: QualityGate
  dependsOn: PolicyValidation
  jobs:
  - template: templates/build-test.yml
    parameters:
      serviceDir: services/api-gateway
      serviceName: api-gateway

- stage: ContainerizeAll
  dependsOn: QualityGate
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: BuildGateway
    pool:
      vmImage: ubuntu-latest
    steps:
    - template: templates/containerize-podman.yml
      parameters:
        serviceDir: services/api-gateway/RetailPos.Gateway.Api
        imageName: retail-pos/api-gateway
        registryFqdn: $(registryFqdn)
        buildId: $(Build.BuildId)

  - job: BuildBffPos
    pool:
      vmImage: ubuntu-latest
    steps:
    - template: templates/containerize-podman.yml
      parameters:
        serviceDir: services/bff/RetailPos.Bff.Pos
        imageName: retail-pos/bff-pos
        registryFqdn: $(registryFqdn)
        buildId: $(Build.BuildId)

  - job: BuildBffWeb
    pool:
      vmImage: ubuntu-latest
    steps:
    - template: templates/containerize-podman.yml
      parameters:
        serviceDir: services/bff/RetailPos.Bff.Web
        imageName: retail-pos/bff-web
        registryFqdn: $(registryFqdn)
        buildId: $(Build.BuildId)

  - job: BuildBffMobile
    pool:
      vmImage: ubuntu-latest
    steps:
    - template: templates/containerize-podman.yml
      parameters:
        serviceDir: services/bff/RetailPos.Bff.Mobile
        imageName: retail-pos/bff-mobile
        registryFqdn: $(registryFqdn)
        buildId: $(Build.BuildId)

- stage: DeployDev
  dependsOn: ContainerizeAll
  jobs:
  - deployment: Deploy
    environment: retail-pos-dev
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@1
            inputs:
              action: deploy
              namespace: retail-pos-dev
              manifests: |
                infrastructure/k8s/api-gateway/deployment.yaml
              containers: |
                $(registryFqdn)/retail-pos/api-gateway:$(Build.BuildId)
                $(registryFqdn)/retail-pos/bff-pos:$(Build.BuildId)
                $(registryFqdn)/retail-pos/bff-web:$(Build.BuildId)
                $(registryFqdn)/retail-pos/bff-mobile:$(Build.BuildId)
